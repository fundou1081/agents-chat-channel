<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agents-chat-channel · 控制台 v2.0</title>
  <link rel="stylesheet" href="/webui/style.css">
</head>
<body>
  <!-- 顶部状态栏 -->
  <header class="topbar">
    <div class="brand">🐟 agents-chat-channel <span class="version">v2.0</span></div>
    <div class="status-bar">
      <span id="conn-status" class="conn-status">●</span>
      <span id="conn-text">连接中...</span>
      <label class="auto-refresh">
        <input type="checkbox" id="auto-refresh" checked> 自动刷新
      </label>
      <select id="refresh-interval">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
      </select>
      <button id="refresh-btn" class="btn">↻ 刷新</button>
    </div>
  </header>

  <div class="layout">
    <!-- 左侧导航 -->
    <nav class="sidebar">
      <ul>
        <li class="nav-item active" data-view="channels">
          <span class="icon">💬</span> 频道管理
          <span class="badge" id="badge-channels">0</span>
        </li>
        <li class="nav-item" data-view="live-chat">
          <span class="icon">🔴</span> 实时聊天
          <span class="badge live-indicator" id="badge-live">●</span>
        </li>
        <li class="nav-item" data-view="workers">
          <span class="icon">🤖</span> Workers
          <span class="badge" id="badge-workers">0</span>
        </li>
      </ul>

      <div class="sidebar-section">
        <h3>快捷操作</h3>
        <button class="btn btn-primary" onclick="showSendModal()">✉️ 发送消息</button>
        <button class="btn" onclick="showNewChannelModal()">+ 新建频道</button>
        <button class="btn" onclick="showNewWorkerModal()">+ 新建 Worker</button>
      </div>
    </nav>

    <!-- 主内容区 -->
    <main class="content">
      <!-- 频道管理 -->
      <section id="view-channels" class="view active">
        <div class="view-header">
          <h2>💬 频道管理</h2>
          <button class="btn btn-primary" onclick="showNewChannelModal()">+ 新建频道</button>
        </div>
        <div class="channel-management-layout">
          <div class="channel-list-panel" id="channel-list-panel">
            <div class="loading">加载中...</div>
          </div>
          <div class="channel-detail-panel" id="channel-detail-panel">
            <div class="empty-state">← 选择一个频道查看详情</div>
          </div>
        </div>
      </section>

      <!-- 实时聊天 -->
      <section id="view-live-chat" class="view">
        <div class="view-header">
          <h2>🔴 实时聊天</h2>
          <div class="live-controls">
            <select id="live-channel-select">
              <option value="">选择频道...</option>
            </select>
            <label class="auto-scroll">
              <input type="checkbox" id="auto-scroll-check" checked> 自动滚动
            </label>
          </div>
        </div>
        <div class="live-chat-container">
          <div class="live-chat-messages" id="live-chat-messages">
            <div class="empty-state">选择一个频道开始观察</div>
          </div>
          <div class="live-chat-input">
            <div class="mention-selector">
              <span class="mention-label">发送给:</span>
              <button class="mention-btn mention-all" onclick="selectAllMentions()" title="发送给所有成员">@All</button>
              <div class="mention-members" id="mention-members">
                <!-- 动态生成成员按钮 -->
              </div>
            </div>
            <div class="input-row">
              <input type="text" id="live-from" value="god" placeholder="发送者">
            </div>
            <div class="input-row">
              <textarea id="live-content" rows="3" placeholder="输入消息... 使用 @成员名 或 @All 来提及 (Enter 发送, Shift+Enter 换行)"></textarea>
              <button class="btn btn-primary" onclick="sendLiveMessage()">发送</button>
            </div>
            <div class="mention-autocomplete" id="mention-autocomplete">
              <!-- 自动补全下拉框 -->
            </div>
            <div class="mention-hint">
              💡 提示: 在输入框中输入 @ 可以触发成员自动补全
            </div>
          </div>
        </div>
      </section>

      <!-- Workers -->
      <section id="view-workers" class="view">
        <div class="view-header">
          <h2>🤖 Workers</h2>
        </div>
        <div id="workers-list">
          <div class="loading">加载中...</div>
        </div>
      </section>
    </main>
  </div>

  <!-- 发送消息 modal -->
  <div id="send-modal" class="modal hidden">
    <div class="modal-content">
      <h3>✉️ 发送消息</h3>
      <div class="form-row">
        <label>频道:</label>
        <select id="send-channel"></select>
      </div>
      <div class="form-row">
        <label>发送者:</label>
        <input type="text" id="send-from" value="god">
      </div>
      <div class="form-row">
        <label>类型:</label>
        <select id="send-type">
          <option value="mention">mention (广播)</option>
          <option value="task_broadcast">task_broadcast (任务)</option>
          <option value="text">text</option>
        </select>
      </div>
      <div class="form-row">
        <label>@提及 (逗号分隔):</label>
        <input type="text" id="send-mentions" placeholder="seller-fish, buyer-fish">
      </div>
      <div class="form-row">
        <label>内容:</label>
        <textarea id="send-content" rows="4" placeholder="消息内容..."></textarea>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="hideSendModal()">取消</button>
        <button class="btn btn-primary" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <!-- 新建频道 modal -->
  <div id="new-channel-modal" class="modal hidden">
    <div class="modal-content">
      <h3>+ 新建频道</h3>
      <div class="form-row">
        <label>频道名:</label>
        <input type="text" id="new-channel-name" placeholder="my-channel">
      </div>
      <div class="form-row">
        <label>最大消息数 (0=不限制):</label>
        <input type="number" id="new-channel-max" value="0" min="0" placeholder="0">
      </div>
      <div class="form-actions">
        <button class="btn" onclick="hideNewChannelModal()">取消</button>
        <button class="btn btn-primary" onclick="createChannel()">创建</button>
      </div>
    </div>
  </div>

  <!-- 新建 Worker modal -->
  <div id="new-worker-modal" class="modal hidden">
    <div class="modal-content modal-large">
      <h3>+ 新建 Worker</h3>
      
      <!-- 基本信息 -->
      <div class="form-row">
        <label>Worker ID:</label>
        <input type="text" id="new-worker-id" placeholder="my-worker">
      </div>
      
      <div class="form-row">
        <label>CLI 类型:</label>
        <select id="new-worker-cli">
          <option value="mock">Mock (测试用)</option>
          <option value="opencode">OpenCode</option>
          <option value="qwen">Qwen</option>
        </select>
      </div>
      
      <!-- Workspace 配置 -->
      <div class="workspace-config">
        <div class="config-header">
          <label>Workspace 配置:</label>
          <div class="workspace-toggle">
            <label class="toggle-option">
              <input type="radio" name="workspace-type" value="new" checked onchange="toggleWorkspaceType()">
              <span>创建新 Workspace</span>
            </label>
            <label class="toggle-option">
              <input type="radio" name="workspace-type" value="existing" onchange="toggleWorkspaceType()">
              <span>使用已有 Workspace</span>
            </label>
          </div>
        </div>
        
        <!-- 新 Workspace 选项 -->
        <div id="new-workspace-options" class="workspace-options">
          <div class="form-row">
            <label>角色名称:</label>
            <input type="text" id="new-worker-role" placeholder="如: 卖鱼小贩">
          </div>
          <div class="form-row">
            <label>系统提示:</label>
            <textarea id="new-worker-prompt" rows="3" placeholder="自定义 system prompt (留空使用默认模板)"></textarea>
          </div>
          <div class="form-row">
            <label>Skills (逗号分隔):</label>
            <input type="text" id="new-worker-skills" placeholder="如: bargaining, negotiation">
          </div>
        </div>
        
        <!-- 已有 Workspace 选项 -->
        <div id="existing-workspace-options" class="workspace-options hidden">
          <div class="form-row">
            <label>选择 Workspace:</label>
            <select id="existing-workspace-select">
              <option value="">加载中...</option>
            </select>
          </div>
          <div class="workspace-info" id="workspace-info">
            <!-- 动态显示 workspace 信息 -->
          </div>
        </div>
      </div>
      
      <div class="form-actions">
        <button class="btn" onclick="hideNewWorkerModal()">取消</button>
        <button class="btn btn-primary" onclick="createWorker()">创建</button>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div id="toast" class="toast hidden"></div>

  <script src="/webui/app.js"></script>
</body>
</html>
